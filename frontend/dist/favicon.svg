<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#15803d"/>
  <!-- Chip body -->
  <rect x="9" y="9" width="14" height="14" rx="2" fill="white" opacity="0.95"/>
  <!-- Pin lines - left -->
  <rect x="5" y="11.5" width="4" height="1.5" rx="0.75" fill="white"/>
  <rect x="5" y="15.25" width="4" height="1.5" rx="0.75" fill="white"/>
  <rect x="5" y="19" width="4" height="1.5" rx="0.75" fill="white"/>
  <!-- Pin lines - right -->
  <rect x="23" y="11.5" width="4" height="1.5" rx="0.75" fill="white"/>
  <rect x="23" y="15.25" width="4" height="1.5" rx="0.75" fill="white"/>
  <rect x="23" y="19" width="4" height="1.5" rx="0.75" fill="white"/>
  <!-- Pin lines - top -->
  <rect x="11.5" y="5" width="1.5" height="4" rx="0.75" fill="white"/>
  <rect x="15.25" y="5" width="1.5" height="4" rx="0.75" fill="white"/>
  <rect x="19" y="5" width="1.5" height="4" rx="0.75" fill="white"/>
  <!-- Pin lines - bottom -->
  <rect x="11.5" y="23" width="1.5" height="4" rx="0.75" fill="white"/>
  <rect x="15.25" y="23" width="1.5" height="4" rx="0.75" fill="white"/>
  <rect x="19" y="23" width="1.5" height="4" rx="0.75" fill="white"/>
  <!-- Inner core -->
  <rect x="12" y="12" width="8" height="8" rx="1.5" fill="#15803d"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
